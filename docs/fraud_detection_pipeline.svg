<svg width="100%" viewBox="0 0 720 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Automatic Fraud Detection — Pipeline Airflow</title>
<desc>Pipeline de détection de fraude : API HuggingFace → fetch_data → validate_schema (Great Expectations) → infer_fraud (MLflow @production) → store_predictions (NeonDB + alerte)</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Légende -->
<rect x="140" y="16" width="12" height="12" rx="3" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235);stroke-width:0.5px;"/>
<text x="158" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Source</text>
<rect x="240" y="16" width="12" height="12" rx="3" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
<text x="258" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Traitement</text>
<rect x="370" y="16" width="12" height="12" rx="3" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
<text x="388" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Modèle</text>
<rect x="460" y="16" width="12" height="12" rx="3" style="fill:rgb(90, 30, 30);stroke:rgb(220, 100, 100);stroke-width:0.5px;"/>
<text x="478" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Stockage</text>

<!-- Titre DAG -->
<text x="360" y="58" text-anchor="middle" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:13px;font-style:italic;">fraud_detection_dag — déclenchement toutes les heures</text>

<!-- Source : API HuggingFace -->
<rect x="30" y="80" width="160" height="66" rx="8" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235);stroke-width:0.5px;"/>
<text x="110" y="106" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181, 212, 244);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">API HuggingFace</text>
<text x="110" y="124" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133, 183, 235);font-family:system-ui,sans-serif;font-size:12px;">transactions fraude</text>

<!-- Flèche source → fetch -->
<line x1="190" y1="113" x2="215" y2="113" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- 1. fetch_data -->
<rect x="215" y="80" width="130" height="66" rx="8" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
<text x="280" y="106" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">1. fetch_data</text>
<text x="280" y="124" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:system-ui,sans-serif;font-size:12px;">récupère les transactions</text>

<!-- Flèche fetch → validate -->
<line x1="345" y1="113" x2="370" y2="113" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- 2. validate_schema -->
<rect x="370" y="80" width="150" height="66" rx="8" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
<text x="445" y="100" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">2. validate_schema</text>
<text x="445" y="118" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:system-ui,sans-serif;font-size:12px;">Great Expectations</text>
<text x="445" y="134" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:system-ui,sans-serif;font-size:12px;">contrôle qualité</text>

<!-- Flèche validate → infer -->
<line x1="520" y1="113" x2="545" y2="113" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- 3. infer_fraud -->
<rect x="545" y="80" width="145" height="66" rx="8" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
<text x="617" y="100" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">3. infer_fraud</text>
<text x="617" y="118" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:system-ui,sans-serif;font-size:12px;">MLflow @production</text>
<text x="617" y="134" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:system-ui,sans-serif;font-size:12px;">Régression logistique</text>

<!-- Flèche infer → store (vers le bas) -->
<line x1="617" y1="146" x2="617" y2="200" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- 4. store_predictions -->
<rect x="505" y="200" width="225" height="66" rx="8" style="fill:rgb(90, 30, 30);stroke:rgb(220, 100, 100);stroke-width:0.5px;"/>
<text x="617" y="220" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255, 180, 180);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">4. store_predictions</text>
<text x="617" y="238" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220, 130, 130);font-family:system-ui,sans-serif;font-size:12px;">NeonDB PostgreSQL</text>
<text x="617" y="254" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220, 130, 130);font-family:system-ui,sans-serif;font-size:12px;">+ alerte si fraude détectée</text>

<!-- MLflow Registry (branche gauche) -->
<rect x="30" y="200" width="200" height="66" rx="8" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
<text x="130" y="220" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">MLflow Registry</text>
<text x="130" y="238" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:system-ui,sans-serif;font-size:12px;">fraud_detector @production</text>
<text x="130" y="254" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:system-ui,sans-serif;font-size:12px;">HuggingFace Spaces</text>

<!-- Flèche MLflow → infer_fraud (pointillé) -->
<path d="M 230 233 L 400 233 L 400 170 L 545 170 L 545 146" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow)" style="stroke:rgb(93, 202, 165);stroke-width:1.5px;fill:none;"/>
<text x="390" y="193" text-anchor="middle" style="fill:rgb(93, 202, 165);font-family:system-ui,sans-serif;font-size:12px;">load @production</text>

<!-- NeonDB -->
<rect x="250" y="200" width="200" height="66" rx="8" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235);stroke-width:0.5px;"/>
<text x="350" y="220" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181, 212, 244);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">NeonDB</text>
<text x="350" y="238" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133, 183, 235);font-family:system-ui,sans-serif;font-size:12px;">fraud_predictions</text>
<text x="350" y="254" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133, 183, 235);font-family:system-ui,sans-serif;font-size:12px;">PostgreSQL managé</text>

<!-- Flèche store → NeonDB -->
<line x1="505" y1="233" x2="450" y2="233" marker-end="url(#arrow)" style="stroke:rgb(220,100,100);stroke-width:1.5px;fill:none;"/>

<!-- Séparateur bas -->
<line x1="30" y1="300" x2="690" y2="300" stroke-dasharray="4 4" style="stroke:rgb(60,60,60);stroke-width:1px;fill:none;"/>

<!-- Training info -->
<text x="360" y="326" text-anchor="middle" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">Entraînement du modèle</text>
<rect x="30" y="340" width="310" height="54" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="185" y="360" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 180, 220);font-family:system-ui,sans-serif;font-size:13px;">fraudTest.csv — 555k transactions</text>
<text x="185" y="378" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">Régression logistique · class_weight="balanced"</text>

<rect x="380" y="340" width="310" height="54" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="535" y="360" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 180, 220);font-family:system-ui,sans-serif;font-size:13px;">Pipeline sklearn · StandardScaler</text>
<text x="535" y="378" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">TargetEncoder · feature engineering dates</text>

</svg>

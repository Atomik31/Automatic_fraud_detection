<svg width="100%" viewBox="0 0 720 510" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Automatic Fraud Detection — Pipeline Airflow</title>
<desc>Pipeline : API HuggingFace → fetch_data → validate_schema (Great Expectations) → infer_fraud (MLflow @production) → store_predictions (NeonDB) → notify_fraud (Slack)</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Légende -->
<rect x="30" y="14" width="12" height="12" rx="3" style="fill:rgb(12,68,124);stroke:rgb(133,183,235);stroke-width:0.5px;"/>
<text x="48" y="24" style="fill:rgb(194,192,182);font-family:system-ui,sans-serif;font-size:11px;">Source</text>
<rect x="108" y="14" width="12" height="12" rx="3" style="fill:rgb(60,52,137);stroke:rgb(175,169,236);stroke-width:0.5px;"/>
<text x="126" y="24" style="fill:rgb(194,192,182);font-family:system-ui,sans-serif;font-size:11px;">Traitement</text>
<rect x="218" y="14" width="12" height="12" rx="3" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px;"/>
<text x="236" y="24" style="fill:rgb(194,192,182);font-family:system-ui,sans-serif;font-size:11px;">Modèle</text>
<rect x="300" y="14" width="12" height="12" rx="3" style="fill:rgb(90,30,30);stroke:rgb(220,100,100);stroke-width:0.5px;"/>
<text x="318" y="24" style="fill:rgb(194,192,182);font-family:system-ui,sans-serif;font-size:11px;">Stockage</text>
<rect x="385" y="14" width="12" height="12" rx="3" style="fill:rgb(80,50,0);stroke:rgb(220,150,30);stroke-width:0.5px;"/>
<text x="403" y="24" style="fill:rgb(194,192,182);font-family:system-ui,sans-serif;font-size:11px;">Notification</text>

<!-- Titre -->
<text x="360" y="52" text-anchor="middle" style="fill:rgb(194,192,182);font-family:system-ui,sans-serif;font-size:12px;font-style:italic;">fraud_detection_dag — 5 tâches — déclenchement toutes les heures</text>

<!-- ── ROW 1 ── -->

<!-- API HuggingFace -->
<rect x="30" y="68" width="148" height="66" rx="8" style="fill:rgb(12,68,124);stroke:rgb(133,183,235);stroke-width:0.5px;"/>
<text x="104" y="93" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181,212,244);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">API HuggingFace</text>
<text x="104" y="112" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-family:system-ui,sans-serif;font-size:11px;">transactions temps réel</text>

<line x1="178" y1="101" x2="198" y2="101" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- 1. fetch_data -->
<rect x="198" y="68" width="122" height="66" rx="8" style="fill:rgb(60,52,137);stroke:rgb(175,169,236);stroke-width:0.5px;"/>
<text x="259" y="93" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,246);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">1. fetch_data</text>
<text x="259" y="112" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-family:system-ui,sans-serif;font-size:11px;">récupère les données</text>

<line x1="320" y1="101" x2="340" y2="101" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- 2. validate_schema -->
<rect x="340" y="68" width="145" height="66" rx="8" style="fill:rgb(60,52,137);stroke:rgb(175,169,236);stroke-width:0.5px;"/>
<text x="412" y="88" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,246);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">2. validate_schema</text>
<text x="412" y="106" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-family:system-ui,sans-serif;font-size:11px;">Great Expectations</text>
<text x="412" y="122" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-family:system-ui,sans-serif;font-size:11px;">colonnes · nulls · montants</text>

<line x1="485" y1="101" x2="505" y2="101" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- 3. infer_fraud -->
<rect x="505" y="68" width="185" height="66" rx="8" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px;"/>
<text x="597" y="88" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">3. infer_fraud</text>
<text x="597" y="106" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-family:system-ui,sans-serif;font-size:11px;">MLflow @production</text>
<text x="597" y="122" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-family:system-ui,sans-serif;font-size:11px;">Régression logistique</text>

<!-- infer → store -->
<line x1="597" y1="134" x2="597" y2="198" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- ── ROW 2 ── -->

<!-- MLflow Registry -->
<rect x="30" y="198" width="185" height="66" rx="8" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px;"/>
<text x="122" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">MLflow Registry</text>
<text x="122" y="236" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-family:system-ui,sans-serif;font-size:11px;">fraud_detector @production</text>
<text x="122" y="252" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-family:system-ui,sans-serif;font-size:11px;">HuggingFace Spaces</text>

<!-- MLflow → infer_fraud (pointillé, contourne par le bas) -->
<path d="M 215 231 L 215 158 L 492 158 L 492 110 L 505 110" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow)" style="stroke:rgb(93,202,165);stroke-width:1.5px;fill:none;"/>
<text x="355" y="150" text-anchor="middle" style="fill:rgb(93,202,165);font-family:system-ui,sans-serif;font-size:11px;">load @production</text>

<!-- NeonDB -->
<rect x="235" y="198" width="175" height="66" rx="8" style="fill:rgb(12,68,124);stroke:rgb(133,183,235);stroke-width:0.5px;"/>
<text x="322" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181,212,244);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">NeonDB</text>
<text x="322" y="236" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-family:system-ui,sans-serif;font-size:11px;">fraud_predictions</text>
<text x="322" y="252" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-family:system-ui,sans-serif;font-size:11px;">PostgreSQL managé</text>

<!-- 4. store_predictions -->
<rect x="468" y="198" width="222" height="66" rx="8" style="fill:rgb(90,30,30);stroke:rgb(220,100,100);stroke-width:0.5px;"/>
<text x="579" y="222" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,180,180);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">4. store_predictions</text>
<text x="579" y="242" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220,130,130);font-family:system-ui,sans-serif;font-size:11px;">NeonDB PostgreSQL</text>

<!-- store → NeonDB -->
<line x1="468" y1="231" x2="410" y2="231" marker-end="url(#arrow)" style="stroke:rgb(220,100,100);stroke-width:1.5px;fill:none;"/>

<!-- store → notify -->
<line x1="579" y1="264" x2="579" y2="308" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- ── ROW 3 ── -->

<!-- Slack -->
<rect x="235" y="308" width="175" height="66" rx="8" style="fill:rgb(80,50,0);stroke:rgb(220,150,30);stroke-width:0.5px;"/>
<text x="322" y="328" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,200,80);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">Slack</text>
<text x="322" y="346" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220,170,50);font-family:system-ui,sans-serif;font-size:11px;">#fraud-alerts</text>
<text x="322" y="362" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220,170,50);font-family:system-ui,sans-serif;font-size:11px;">alerte en temps réel</text>

<!-- 5. notify_fraud -->
<rect x="468" y="308" width="222" height="66" rx="8" style="fill:rgb(80,50,0);stroke:rgb(220,150,30);stroke-width:0.5px;"/>
<text x="579" y="328" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255,200,80);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">5. notify_fraud</text>
<text x="579" y="346" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220,170,50);font-family:system-ui,sans-serif;font-size:11px;">si fraude détectée</text>
<text x="579" y="362" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220,170,50);font-family:system-ui,sans-serif;font-size:11px;">webhook Slack</text>

<!-- notify → Slack -->
<line x1="468" y1="341" x2="410" y2="341" marker-end="url(#arrow)" style="stroke:rgb(220,150,30);stroke-width:1.5px;fill:none;"/>

<!-- ── Séparateur ── -->
<line x1="30" y1="408" x2="690" y2="408" stroke-dasharray="4 4" style="stroke:rgb(60,60,60);stroke-width:1px;fill:none;"/>

<!-- ── Training info ── -->
<text x="360" y="428" text-anchor="middle" style="fill:rgb(194,192,182);font-family:system-ui,sans-serif;font-size:12px;font-weight:500;">Entraînement du modèle</text>
<rect x="30" y="442" width="310" height="52" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="185" y="461" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180,180,220);font-family:system-ui,sans-serif;font-size:12px;">fraudTest.csv — 555k transactions</text>
<text x="185" y="479" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140,140,180);font-family:system-ui,sans-serif;font-size:11px;">Régression logistique · class_weight="balanced"</text>

<rect x="380" y="442" width="310" height="52" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="535" y="461" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180,180,220);font-family:system-ui,sans-serif;font-size:12px;">Pipeline sklearn · StandardScaler</text>
<text x="535" y="479" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140,140,180);font-family:system-ui,sans-serif;font-size:11px;">TargetEncoder · feature engineering dates</text>

